appId: com.smartreader.app
publish: null
productName: 智能读书笔记
directories:
  output: release
files:
  - dist
  - dist-electron
  - node_modules/better-sqlite3/**/*
asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
mac:
  target:
    - dmg
  category: public.app-category.education
  artifactName: ${productName}-${version}-${arch}.${ext}
  identity: null
dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
win:
  target:
    - nsis
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
